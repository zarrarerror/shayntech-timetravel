services:
  timetravel:
    build:
      context: ..
      dockerfile: enterprise/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - tt_data:/data
    environment:
      - TT_HOST=0.0.0.0
      - TT_PORT=8080
      # Set this to connect to NeonDB / Supabase / any PostgreSQL
      # - TT_PG_CONNECTION=postgresql://user:pass@host:5432/db?sslmode=require

volumes:
  tt_data:
